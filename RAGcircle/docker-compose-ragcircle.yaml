# Profiles:
#   infra     - Storage, messaging, search (rustfs, postgres, rabbitmq, qdrant, opensearch)
#   inference - ML embedding model (infinity)
#   apps      - Applications (gate, doc-processor, retrieval, generator, nginx-gate)
#
# Examples:
#   docker compose --profile infra up
#   docker compose --profile infra --profile inference up
#   docker compose --profile infra --profile inference --profile apps up  # full stack
name: ragcircle-dev-11
services:

  # ── Storage ──────────────────────────────────────────────

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.78
    command: /data
    user: "0:0"
    ports:
      - "127.0.0.1:11000:9000"
      - "127.0.0.1:11001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfs
      RUSTFS_SECRET_KEY: password
      RUSTFS_REGION: eu-central
      # MQTT notifications → RabbitMQ
      RUSTFS_NOTIFY_MQTT_ENABLE_primary: "on"
      RUSTFS_NOTIFY_MQTT_BROKER_primary: "tcp://rabbitmqq1:1883"
      RUSTFS_NOTIFY_MQTT_TOPIC_primary: "rustfs/events"
      RUSTFS_NOTIFY_MQTT_QOS_primary: "1"
      RUSTFS_NOTIFY_MQTT_USERNAME_primary: "admin"
      RUSTFS_NOTIFY_MQTT_PASSWORD_primary: "admin"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rustfs-net
    profiles: [infra]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:11002:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [infra]
    restart: unless-stopped

  # ── Messaging ────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmqq1
    ports:
      - "127.0.0.1:11003:5672"   # AMQP
      - "127.0.0.1:11004:15672"  # Management UI
      - "127.0.0.1:11005:1883"   # MQTT (used by RustFS)
      - "127.0.0.1:11006:15675"  # Web MQTT
    command: >
      bash -lc "rabbitmq-plugins enable --offline rabbitmq_mqtt rabbitmq_web_mqtt &&
                exec rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - rustfs-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [infra]
    restart: unless-stopped

  # ── Search ───────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:11007:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    profiles: [infra]
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    ports:
      - "127.0.0.1:11008:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=5a5d5sSS!!13423g!d23s!g2
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    profiles: [infra]
    restart: unless-stopped

  # ── Applications ─────────────────────────────────────────

  gate:
    build:
      context: .
      dockerfile: gate_v2/Dockerfile
    env_file:
      - ./gate_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped

  doc-processor:
    build:
      context: ./doc_processor_v2
    env_file:
      - ./doc_processor_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rustfs:
        condition: service_started
      infinity:
        condition: service_started
    restart: unless-stopped

  retrieval:
    build:
      context: .
      dockerfile: retrieval_v2/Dockerfile
    env_file:
      - ./retrieval_v2/env.example
    environment:
      EMBEDDER_URL: "http://localhost:8902"
      EMBEDDER_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-m3}"
      QDRANT_URL: "http://localhost:${RUGFUNSOTA_QDRANT_HTTP:-8903}"
      OPENSEARCH_URL: "http://localhost:${RUGFUNSOTA_OS_PORT:-8905}"
      PORT: "8920"
    network_mode: host
    profiles: [apps]
    depends_on:
      infinity:
        condition: service_started
    restart: unless-stopped

  generator:
    build:
      context: .
      dockerfile: generator_v2/Dockerfile
    env_file:
      - ./generator_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      - retrieval
    restart: unless-stopped

