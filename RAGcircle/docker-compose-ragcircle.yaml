# Profiles:
#   infra     - Storage, messaging, search (rustfs, postgres, rabbitmq, qdrant, opensearch)
#   inference - infinity embedder + reranker, vLLM VLM (see host ports in comment below)
#   apps      - Applications (gate, doc-processor, retrieval, generator, nginx-gate)
#
# Examples:
#   docker compose --profile infra up
#   docker compose --profile infra --profile inference up
#   docker compose --profile infra --profile inference --profile apps up  # full stack
#
# Inference host ports: embedder 11008, rerank 11009, VLM 11010 (OpenSearch → 11011)
name: ragcircle-dev-11
services:

  # ── Storage ──────────────────────────────────────────────

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.78
    command: /data
    user: "0:0"
    ports:
      - "127.0.0.1:11000:9000"
      - "127.0.0.1:11001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfs
      RUSTFS_SECRET_KEY: password
      RUSTFS_REGION: eu-central
      # MQTT notifications → RabbitMQ
      RUSTFS_NOTIFY_MQTT_ENABLE_primary: "on"
      RUSTFS_NOTIFY_MQTT_BROKER_primary: "tcp://rabbitmqq1:1883"
      RUSTFS_NOTIFY_MQTT_TOPIC_primary: "rustfs/events"
      RUSTFS_NOTIFY_MQTT_QOS_primary: "1"
      RUSTFS_NOTIFY_MQTT_USERNAME_primary: "admin"
      RUSTFS_NOTIFY_MQTT_PASSWORD_primary: "admin"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rustfs-net
    profiles: [infra]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:11002:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [infra]
    restart: unless-stopped

  # ── Messaging ────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmqq1
    ports:
      - "127.0.0.1:11003:5672"   # AMQP
      - "127.0.0.1:11004:15672"  # Management UI
      - "127.0.0.1:11005:1883"   # MQTT (used by RustFS)
      - "127.0.0.1:11006:15675"  # Web MQTT
    command: >
      bash -lc "rabbitmq-plugins enable --offline rabbitmq_mqtt rabbitmq_web_mqtt &&
                exec rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - rustfs-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [infra]
    restart: unless-stopped

  # ── Search ───────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:11007:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    profiles: [infra]
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    ports:
      - "127.0.0.1:11011:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=5a5d5sSS!!13423g!d23s!g2
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    profiles: [infra]
    restart: unless-stopped

  # ── Applications ─────────────────────────────────────────

  gate:
    build:
      context: .
      dockerfile: gate_v2/Dockerfile
    env_file:
      - ./gate_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped

  doc-processor:
    build:
      context: ./doc_processor_v2
    env_file:
      - ./doc_processor_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rustfs:
        condition: service_started
      infinity:
        condition: service_started
    restart: unless-stopped

  retrieval:
    build:
      context: .
      dockerfile: retrieval_v2/Dockerfile
    env_file:
      - ./retrieval_v2/.env
    network_mode: host
    profiles: [apps]
    restart: unless-stopped

  generator:
    build:
      context: .
      dockerfile: generator_v2/Dockerfile
    env_file:
      - ./generator_v2/.env
    network_mode: host
    profiles: [apps]
    depends_on:
      - retrieval
    restart: unless-stopped

  # # ── Reverse Proxy ───────────────────────────────────────
  # nginx-gate:
  #   image: nginx:alpine
  #   network_mode: host
  #   profiles: [apps]
  #   depends_on:
  #     - gate
  #   restart: unless-stopped
  #   command:
  #     - sh
  #     - -c
  #     - |
  #       cat > /etc/nginx/conf.d/default.conf <<'EOF'
  #       server {
  #           listen 8916;
  #           location / {
  #               proxy_pass http://localhost:8912;
  #               proxy_set_header Host $$host;
  #               proxy_set_header X-Real-IP $$remote_addr;
  #               proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
  #               proxy_set_header X-Forwarded-Proto $$scheme;
  #           }
  #       }
  #       EOF
  #       nginx -g 'daemon off;'

  # ── ML / inference (GPUs: VLM → 0, embedder + rerank → 1) ──

  infinity:
    image: michaelf34/infinity:latest
    command:
      - v2
      - --model-id
      - ${EMBEDDER_MODEL:-BAAI/bge-m3}
      - --port
      - "7997"
    environment:
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-BAAI/bge-m3}
    ports:
      - "127.0.0.1:11008:7997"
    volumes:
      - infinity-cache:/app/.cache
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    # Also `apps`: required so `doc-processor.depends_on` resolves when using --profile apps without listing inference only in the model graph.
    profiles: [inference, apps]
    restart: unless-stopped

  infinity-rerank:
    image: michaelf34/infinity:latest
    command:
      - v2
      - --model-id
      - ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - --port
      - "7998"
    environment:
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
    ports:
      - "127.0.0.1:11009:7998"
    volumes:
      - infinity-cache:/app/.cache
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    profiles: [inference]
    restart: unless-stopped

  vlm:
    image: vllm/vllm-openai:latest
    command:
      - --model
      - ${VLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLM_GPU_MEMORY_UTIL:-0.82}
      - --max-model-len
      - ${VLM_MAX_MODEL_LEN:-4096}
    environment:
      VLM_MODEL: ${VLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "127.0.0.1:11010:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    profiles: [inference]
    restart: unless-stopped

volumes:
  pgdata:
  infinity-cache:
  qdrant-data:
  opensearch-data:

networks:
  rustfs-net:
  rag-network:
