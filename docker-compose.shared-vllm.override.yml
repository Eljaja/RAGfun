services:
  retrieval:
    depends_on:
      infinity-embed:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rag-gate:
    environment:
      GATE_LLM_BASE_URL: ${SHARED_LLM_BASE_URL}
      GATE_LLM_MODEL: ${SHARED_LLM_MODEL}
      GATE_LLM_API_KEY: ${SHARED_LLM_API_KEY:-}

  agent-search:
    environment:
      AGENT_LLM_BASE_URL: ${SHARED_LLM_BASE_URL}
      AGENT_LLM_MODEL: ${SHARED_LLM_MODEL}
      AGENT_LLM_API_KEY: ${SHARED_LLM_API_KEY:-}

  doc-processor:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROCESSOR_VLM_BASE_URL: ${SHARED_VLM_BASE_URL}
      PROCESSOR_VLM_MODEL: ${SHARED_VLM_MODEL}
      PROCESSOR_VLM_API_KEY: ${SHARED_VLM_API_KEY:-}

  ingestion-worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROCESSOR_VLM_BASE_URL: ${SHARED_VLM_BASE_URL}
      PROCESSOR_VLM_MODEL: ${SHARED_VLM_MODEL}
      PROCESSOR_VLM_API_KEY: ${SHARED_VLM_API_KEY:-}

  # Prevent accidental port conflicts with the already running shared local vLLM.
  # You can still start it explicitly with `--profile local-vlm` if needed later.
  vllm-docling:
    profiles:
      - local-vlm
    ports: []

  # Keep personal UI on a non-default port.
  ui:
    ports:
      - "${RUGFUNSOTA_UI_PORT:-13301}:80"

  # Observability services use fixed container names in the base compose file.
  # Move them behind an explicit profile so `up` on a personal stack does not clash.
  prometheus:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-prometheus"
    ports:
      - "${RUGFUNSOTA_PROMETHEUS_PORT:-19090}:9090"

  postgres-exporter:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-postgres-exporter"

  opensearch-exporter:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-opensearch-exporter"

  node-exporter:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-node-exporter"

  cadvisor:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-cadvisor"

  grafana:
    profiles:
      - observability
    container_name: "${COMPOSE_PROJECT_NAME:-ragfun-local}-grafana"
    ports:
      - "${RUGFUNSOTA_GRAFANA_PORT:-13000}:3000"
