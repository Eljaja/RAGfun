name: rugfunsota

services:
  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-StrongPassword123!}
      - "OPENSEARCH_JAVA_OPTS=-Xms16g -Xmx16g"
    ports:
      - "${RUGFUNSOTA_OS_PORT:-9201}:9200"
      - "${RUGFUNSOTA_OS_DEBUG_PORT:-9601}:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      # Reduce noisy per-request access logs from actix_web middleware logger.
      - RUST_LOG=warn,actix_web=warn
    ports:
      - "${RUGFUNSOTA_QDRANT_HTTP:-6335}:6333"
      - "${RUGFUNSOTA_QDRANT_GRPC:-6336}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-network
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/localhost/6333; printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -n 1 <&3 | grep -q '200'"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-1000}"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=256MB"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=document_storage
      - POSTGRES_MAX_CONNECTIONS=${POSTGRES_MAX_CONNECTIONS:-1000}
    ports:
      - "127.0.0.1:${RUGFUNSOTA_PG_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=document_storage
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - MIN_POOL_SIZE=10
      - RESERVE_POOL_SIZE=20
      - SERVER_IDLE_TIMEOUT=300
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-network

  # RustFS: not started by default; use existing presign-rustfs-1. To run own: docker compose --profile local-rustfs up -d
  rustfs:
    profiles:
      - local-rustfs
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0...3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
    networks:
      - rag-network
      - rustfs-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  rabbitmq:
    image: rabbitmq:3-management
    # Enable built-in Prometheus metrics plugin (exposes :15692/metrics)
    command: >
      sh -c "
        rabbitmq-plugins enable --offline rabbitmq_prometheus &&
        rabbitmq-server
      "
    ports:
      - "${RUGFUNSOTA_RABBIT_AMQP:-5673}:5672"
      - "${RUGFUNSOTA_RABBIT_HTTP:-15673}:15672"
      - "${RUGFUNSOTA_RABBIT_PROM:-15693}:15692"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  infinity-embed:
    image: michaelf34/infinity:latest
    command: ["v2", "--model-id", "BAAI/bge-m3", "--port", "7997"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_DEVICE_EMBED:-0}
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_DEVICE_EMBED:-0}"]
              capabilities: [gpu]

  # Stateless Hybrid Retrieval microservice (scale this one for multiple replicas)
  retrieval:
    build:
      context: .
      dockerfile: service/Dockerfile
    ports:
      - "${RUGFUNSOTA_RETRIEVAL_PORT:-8085}:8080"
    environment:
      # =========================
      # Retrieval / Search quality knobs (RAG_*)
      # =========================
      # Service identity
      - RAG_SERVICE_NAME=hybrid-retrieval
      - RAG_ENVIRONMENT=dev
      - RAG_LOG_LEVEL=INFO
      # OpenSearch (BM25)
      - RAG_OS_URL=${RAG_OS_URL:-http://opensearch:9200}
      # Optional auth:
      # - RAG_OS_USERNAME=...
      # - RAG_OS_PASSWORD=...
      - RAG_OS_INDEX_ALIAS=${STUB_PROJECT_ID:-default}
      - RAG_OS_INDEX_PREFIX=${STUB_PROJECT_ID:-default}_v
      # Qdrant (Vector)
      - RAG_QDRANT_URL=${RAG_QDRANT_URL:-http://qdrant:6333}
      # Optional auth:
      # - RAG_QDRANT_API_KEY=...
      # Single stub project collection shared with gate_v2/doc_processor_v2 ingestion.
      - RAG_QDRANT_COLLECTION=${STUB_PROJECT_ID:-default}
      - RAG_VECTOR_DISTANCE=cosine
      # Embeddings (Infinity inside docker network)
      - RAG_EMBEDDING_PROVIDER=http
      - RAG_EMBEDDING_URL=${RAG_EMBEDDING_URL:-http://infinity-embed:7997/embeddings}
      - RAG_EMBEDDING_MODEL=BAAI/bge-m3
      # Optional auth (if your embeddings endpoint needs it):
      # - RAG_EMBEDDING_API_KEY=...
      - RAG_EMBEDDING_TIMEOUT_S=10
      - RAG_EMBEDDING_BATCH_SIZE=4048
      - RAG_EMBEDDING_CONCURRENCY=32
      - RAG_VECTOR_SIZE=1024
      # Contextual Chunk Headers (CCH) for embeddings (opt-in; requires re-index/re-embed when enabled)
      - RAG_EMBEDDING_CONTEXTUAL_HEADERS_ENABLED=true
      - RAG_EMBEDDING_CONTEXTUAL_HEADERS_MAX_CHARS=400
      # Chunking (mode=document): semchunk (default) or use docker-compose-semantic.yml for semantic
      - RAG_CHUNK_STRATEGY=semchunk
      - RAG_CHUNK_MAX_TOKENS=512
      - RAG_CHUNK_OVERLAP_TOKENS=50
      - RAG_CHUNK_ENCODING=cl100k_base
      # Candidate pool (QUALITY): increase recall before fusion/rerank
      - RAG_DEFAULT_TOP_K=20
      - RAG_BM25_TOP_K=200
      - RAG_VECTOR_TOP_K=200
      # Fusion tuning
      - RAG_RRF_K=60
      - RAG_WEIGHT_BM25=1.0
      - RAG_WEIGHT_VECTOR=1.0
      - RAG_FUSION_ALPHA=0.75
      # IMPORTANT for file_hit@k: return more unique doc_ids in top_k by limiting chunks-per-doc.
      - RAG_MAX_CHUNKS_PER_DOC=1
      # Sources / URI redaction
      - RAG_REDACT_URI_MODE=none
      # Rerank: http (Infinity) or local (in-process CPU)
      - RAG_RERANK_PROVIDER=http
      - RAG_RERANK_MODE=auto
      - RAG_RERANK_URL=${RAG_RERANK_URL:-http://infinity-rerank:7998/rerank}
      - RAG_RERANK_MODEL=BAAI/bge-reranker-v2-m3
      # Optional auth (if your rerank endpoint needs it):
      # - RAG_RERANK_API_KEY=...
      # Rerank knobs (QUALITY): increase re-ranked candidate cap + allow more time
      - RAG_RERANK_TIMEOUT_S=15
      - RAG_RERANK_MAX_CANDIDATES=200
      - RAG_RERANK_AUTO_MIN_QUERY_TOKENS=6
      - RAG_RERANK_AUTO_MIN_INTERSECTION=2
      # Page-level improvements (QUALITY)
      - RAG_ENABLE_PAGE_DEDUPLICATION=false
      - RAG_ENABLE_PARENT_PAGE_RETRIEVAL=false
      # Observability (optional)
      - RAG_OTEL_ENABLED=false
      - RAG_OTEL_SERVICE_NAME=hybrid-retrieval
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      # infinity-embed / infinity-rerank optional when RAG_EMBEDDING_URL / RAG_RERANK_URL point to external services
      # infinity-embed:
      #   condition: service_started
      # infinity-rerank:
      #   condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - rag-network
      # Optional: attach to rag_fun stack network for shared infinity-embed/rerank
      # - rag_fun_rag-network

  # Document Storage (S3: use existing presign-rustfs-1 on presign_rustfs-net)
  document-storage:
    build:
      context: ./document-storage
    ports:
      - "${RUGFUNSOTA_STORAGE_PORT:-8083}:8081"
    environment:
      - STORAGE_SERVICE_NAME=document-storage
      - STORAGE_ENVIRONMENT=dev
      - STORAGE_LOG_LEVEL=INFO
      # Default local; for S3 set STORAGE_STORAGE_BACKEND=s3 and presign_rustfs-net
      - STORAGE_STORAGE_BACKEND=${STORAGE_STORAGE_BACKEND:-local}
      - STORAGE_STORAGE_PATH=/data/documents
      # S3: existing presign-rustfs-1 or run own with --profile local-rustfs
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT:-http://presign-rustfs-1:9000}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-documents}
      - STORAGE_S3_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - STORAGE_S3_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-us-east-1}
      - STORAGE_DB_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/document_storage
      - STORAGE_DB_POOL_MIN=${STORAGE_DB_POOL_MIN:-1}
      - STORAGE_DB_POOL_MAX=${STORAGE_DB_POOL_MAX:-${POSTGRES_MAX_CONNECTIONS:-1000}}
      - STORAGE_MAX_FILE_SIZE_MB=100
      - STORAGE_ALLOWED_CONTENT_TYPES=text/plain,text/markdown,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/html,application/xhtml+xml,text/xml,application/xml
      # ODS tenants + API keys (admin-only endpoints use X-ODS-ADMIN-SECRET)
      - STORAGE_ODS_ADMIN_SECRET=${STORAGE_ODS_ADMIN_SECRET:-admin_secret_test}
      - STORAGE_ODS_API_KEY_SALT=${STORAGE_ODS_API_KEY_SALT:-salt_test_123}
    volumes:
      - document-storage-data:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - rag-network
      - presign_rustfs-net

  # vLLM (OpenAI-compatible) hosting Granite-Docling VLM. Single GPU: 0; multi-GPU: 0 or 1
  vllm-docling:
    image: vllm/vllm-openai:latest
    command: ["--model", "ibm-granite/granite-docling-258M", "--port", "8123"]
    ports:
      - "8124:8123"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_DEVICE_VLLM:-0}
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_DEVICE_VLLM:-0}"]
              capabilities: [gpu]

  # Document Processor Service (pulls files from document-storage, uses Granite-Docling via vLLM, indexes into retrieval)
  doc-processor:
    build:
      context: ./doc-processor
    # ports:
    #   - "8082:8082"
    environment:
      # =========================
      # Document processing (PROCESSOR_*)
      # =========================
      - PROCESSOR_SERVICE_NAME=doc-processor
      - PROCESSOR_ENVIRONMENT=dev
      - PROCESSOR_LOG_LEVEL=INFO
      - PROCESSOR_STORAGE_URL=http://document-storage:8081
      - PROCESSOR_STORAGE_TIMEOUT_S=60
      - PROCESSOR_RETRIEVAL_URL=http://retrieval:8080
      - PROCESSOR_RETRIEVAL_TIMEOUT_S=60
      - PROCESSOR_VLM_BASE_URL=http://vllm-docling:8123/v1
      # Optional auth (if your VLM endpoint needs it):
      # - PROCESSOR_VLM_API_KEY=...
      - PROCESSOR_VLM_MODEL=ibm-granite/granite-docling-258M
      # Extraction quality knobs (QUALITY)
      - PROCESSOR_VLM_TIMEOUT_S=180
      - PROCESSOR_MAX_PAGES=35
      - PROCESSOR_MAX_IMAGE_SIDE_PX=2000
      # Chunking: semantic (section-based) or fixed (char-based)
      - PROCESSOR_CHUNK_STRATEGY=semantic
      - PROCESSOR_CHUNK_SIZE_CHARS=4000
      - PROCESSOR_CHUNK_OVERLAP_CHARS=300
    depends_on:
      document-storage:
        condition: service_started
      retrieval:
        condition: service_healthy
      # vllm-docling optional for .txt (doc-processor uses extract_text_non_vlm). For PDF/DOCX start vllm-docling or add condition: service_started
      # vllm-docling:
      #   condition: service_started
    networks:
      - rag-network

  ingestion-worker:
    build:
      context: ./doc-processor
    command: ["python", "-m", "app.worker"]
    environment:
      - WORKER_RABBIT_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      - WORKER_QUEUE=ingestion.tasks
      - WORKER_RETRY_QUEUE=ingestion.tasks.retry
      - WORKER_DLQ_QUEUE=ingestion.tasks.dlq
      - WORKER_RETRY_TTL_MS=5000
      - WORKER_MAX_ATTEMPTS=5
      - WORKER_PREFETCH=5
      - WORKER_METRICS_PORT=8083
      - WORKER_STORAGE_URL=http://document-storage:8081
      - WORKER_STORAGE_TIMEOUT_S=60
      - WORKER_RETRIEVAL_URL=http://retrieval:8080
      - WORKER_RETRIEVAL_TIMEOUT_S=60
      - WORKER_DOC_PROCESSOR_URL=http://doc-processor:8082
      - WORKER_DOC_PROCESSOR_TIMEOUT_S=300
      - WORKER_LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
      document-storage:
        condition: service_started
      retrieval:
        condition: service_healthy
      doc-processor:
        condition: service_started
    networks:
      - rag-network

  # RAG LLM gate (calls retrieval + LLM)
  rag-gate:
    build:
      context: .
      dockerfile: gate/Dockerfile
    ports:
      - "${RUGFUNSOTA_GATE_PORT:-8092}:8090"
    environment:
      # =========================
      # Gate / RAG orchestration (GATE_*)
      # =========================
      - GATE_SERVICE_NAME=rag-gate
      - GATE_ENVIRONMENT=dev
      - GATE_LOG_LEVEL=INFO
      # Use docker network service name for retrieval. Override in .env if rugfunsota retrieval hangs (both stacks): GATE_RETRIEVAL_URL=http://host.docker.internal:8080
      - GATE_RETRIEVAL_URL=${GATE_RETRIEVAL_URL:-http://retrieval:8080}
      - GATE_RETRIEVAL_TIMEOUT_S=60
      - GATE_RETRIEVAL_MODE=hybrid
      # Default top_k for chat requests (ru_eval overrides per-request, but keeping this aligned helps).
      - GATE_TOP_K=8
      - GATE_MAX_CONTEXT_CHARS=18000
      # Context packing (segment stitching) (opt-in)
      - GATE_SEGMENT_STITCHING_ENABLED=false
      - GATE_SEGMENT_STITCHING_MAX_CHUNKS=4
      - GATE_SEGMENT_STITCHING_GROUP_BY_PAGE=true
      # Multi-query retrieval (RRF fusion of query variants)
      - GATE_MULTI_QUERY_ENABLED=true
      - GATE_MULTI_QUERY_MAX_QUERIES=4
      - GATE_MULTI_QUERY_TOP_K_MULTIPLIER=12
      - GATE_MULTI_QUERY_RRF_K=60
      # Two-pass retrieval (second query augmented with hint terms from pass1 hits)
      - GATE_TWO_PASS_ENABLED=false
      - GATE_TWO_PASS_HINT_MAX_TERMS=8
      - GATE_TWO_PASS_MIN_UNIQUE_DOCS=3
      # BM25 anchor pass: ensure exact-match entities don't get dropped by hybrid/rerank
      - GATE_BM25_ANCHOR_ENABLED=true
      - GATE_BM25_ANCHOR_TOP_K=60
      - GATE_BM25_ANCHOR_RRF_K=60
      # Document Storage
      - GATE_STORAGE_URL=http://document-storage:8081
      - GATE_STORAGE_TIMEOUT_S=60
      # Document Processor
      - GATE_DOC_PROCESSOR_URL=http://doc-processor:8082
      - GATE_DOC_PROCESSOR_TIMEOUT_S=300
      # Async ingestion queue
      - GATE_RABBIT_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      - GATE_RABBIT_QUEUE=ingestion.tasks
      # LLM (OpenAI-compatible). Keep mock as default to avoid requiring a key by default.
      - GATE_LLM_PROVIDER=${GATE_LLM_PROVIDER:-openai_compat}
      - GATE_LLM_BASE_URL=${GATE_LLM_BASE_URL:-https://llm.c.singularitynet.io/v1}
      - GATE_LLM_MODEL=${GATE_LLM_MODEL:-minimax/minimax-m2.1}
      - GATE_LLM_API_KEY=${GATE_LLM_API_KEY:-}
      - GATE_LLM_TIMEOUT_S=60
      # ODS tenant enforcement (\"full ODS\")
      - GATE_REQUIRE_TENANT_AUTH=${GATE_REQUIRE_TENANT_AUTH:-true}
      - GATE_API_KEY_HEADER=${GATE_API_KEY_HEADER:-X-ODS-API-KEY}
      - GATE_TENANT_CACHE_TTL_S=${GATE_TENANT_CACHE_TTL_S:-300}
      # CORS / UI
      - GATE_CORS_ALLOW_ORIGINS=*
    depends_on:
      retrieval:
        condition: service_started
      document-storage:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rag-network

  # Agentic search service (agent_cli as a microservice). Optional: dir removed in cleanup-sota-repo.
  agent-search:
    profiles:
      - agent-search
    build:
      context: .
      dockerfile: agent-search/Dockerfile
    ports:
      - "${RUGFUNSOTA_AGENT_PORT:-8093}:8091"
    environment:
      - AGENT_GATE_URL=http://rag-gate:8090
      - AGENT_GATE_TIMEOUT_S=60
      - AGENT_MAX_LLM_CALLS=${AGENT_MAX_LLM_CALLS:-12}
      - AGENT_MAX_FACT_QUERIES=${AGENT_MAX_FACT_QUERIES:-2}
      - AGENT_LLM_BASE_URL=${GATE_LLM_BASE_URL:-https://llm.c.singularitynet.io/v1}
      - AGENT_LLM_MODEL=${GATE_LLM_MODEL:-minimax/minimax-m2.1}
      - AGENT_LLM_API_KEY=${GATE_LLM_API_KEY:-}
      - AGENT_LLM_TIMEOUT_S=60
      - AGENT_USE_HYDE=${AGENT_USE_HYDE:-}
      - AGENT_USE_FACT_QUERIES=${AGENT_USE_FACT_QUERIES:-true}
      - AGENT_USE_RETRY=${AGENT_USE_RETRY:-true}
    depends_on:
      rag-gate:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rag-network

  # Simple frontend (nginx static + proxy /api to rag-gate)
  ui:
    build:
      context: ./ui
    ports:
      - "3301:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rag-gate:
        condition: service_started
    networks:
      - rag-network

  # Rerank service (Infinity). Kept in the same docker network for stable DNS (infinity-rerank).
  # 1 GPU: NVIDIA_DEVICE_RERANK=0. 2 GPU: NVIDIA_DEVICE_RERANK=1
  infinity-rerank:
    image: michaelf34/infinity:latest
    command: ["v2", "--model-id", "BAAI/bge-reranker-v2-m3", "--port", "7998"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_DEVICE_RERANK:-0}
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_DEVICE_RERANK:-0}"]
              capabilities: [gpu]
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rag-network

  # Postgres metrics exporter (Prometheus)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-network

  # OpenSearch metrics exporter (Prometheus)
  opensearch-exporter:
    image: prometheuscommunity/elasticsearch-exporter:v1.8.0
    container_name: opensearch-exporter
    command:
      - "--es.uri=http://opensearch:9200"
      - "--es.all"
      - "--es.indices"
      - "--es.shards"
      - "--es.cluster_settings"
      - "--es.timeout=10s"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - rag-network

  # Host metrics (Prometheus)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - rag-network

  # Container metrics (Prometheus)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - rag-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - rag-network

volumes:
  opensearch-data:
    driver: local
  qdrant-data:
    driver: local
  postgres-data:
    driver: local
  document-storage-data:
    driver: local
  rustfs_data_0:
    driver: local
  rustfs_data_1:
    driver: local
  rustfs_data_2:
    driver: local
  rustfs_data_3:
    driver: local
  rustfs_logs:
  rabbitmq-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  rag-network:
    driver: bridge
  rustfs-network:
    driver: bridge
  # Network of existing RustFS (presign-rustfs-1)
  presign_rustfs-net:
    external: true
  # rag_fun stack network for retrieval to use shared infinity-embed/rerank when no GPU
  rag_fun_rag-network:
    external: true