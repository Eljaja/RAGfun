server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  etag off;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri /index.html;
  }

  location ~* \.(js)$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Browser calls /api/v1/...; upstream expects /v1/...
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-ODS-API-KEY $http_x_ods_api_key;
    # SSE support
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_pass http://host.docker.internal:8092/;
  }

  # Agent search service (SSE) — no buffering, long read timeout for stream
  location /agent-api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-ODS-API-KEY $http_x_ods_api_key;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    add_header X-Accel-Buffering no;
    proxy_pass http://host.docker.internal:8093/;
  }

  # gate_v2 storage API (projects/documents upload/list/delete)
  location /storage-api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_pass http://host.docker.internal:8916;
  }

}
